name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend/app

      - name: Run backend smoke tests
        run: python -m unittest discover -s backend/tests -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build and start compose stack
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null && curl -fsS http://127.0.0.1:5173/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become healthy in time"
          docker compose logs
          exit 1

      - name: Smoke test live routes
        run: |
          curl -fsS http://127.0.0.1:8000/api/health
          curl -fsS http://127.0.0.1:5173/ >/dev/null
          curl -fsS http://127.0.0.1:5173/api/state >/dev/null

      - name: Stop compose stack
        if: always()
        run: docker compose down -v
